<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Footer</title>

<style>
/* Footer */
.footer {
    background-color: #222;
    color: white;
    padding: 30px 20px;
}

.footer-container {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
}

.footer-section {
    flex: 1;
    min-width: 250px;
}

.footer-section h3 {
    margin-bottom: 15px;
}

.footer-section ul {
    list-style: none;
    padding: 0;
}

.footer-section ul li {
    margin-bottom: 10px;
}

.footer-section ul li a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

/* Hover Effect */
.footer-section ul li a:hover {
    color: #ffd700;
    padding-left: 5px;
}

.footer-bottom {
    text-align: center;
    margin-top: 20px;
    border-top: 1px solid #555;
    padding-top: 10px;
}

/* Responsive สำหรับมือถือ */
@media (max-width: 768px) {
    .footer-container {
        flex-direction: column;
        text-align: center;
    }
}
</style>

</head>
<body>

<footer class="footer">
    <div class="footer-container">

        <!-- ข้อมูลเกี่ยวกับหน่วยงาน -->
        <div class="footer-section">
            <h3>ข้อมูลเกี่ยวกับหน่วยงาน</h3>
            <p>
                วิทยาลัยเทคโนโลยีตัวอย่าง มุ่งเน้นการพัฒนาความรู้
                และทักษะด้านเทคโนโลยีเพื่ออนาคต
            </p>
        </div>

        <!-- เมนูเว็บไซต์ -->
        <div class="footer-section">
            <h3>เมนูเว็บไซต์</h3>
            <ul>
                <li><a href="#">หน้าแรก</a></li>
                <li><a href="#">เกี่ยวกับเรา</a></li>
                <li><a href="#">บริการ</a></li>
                <li><a href="#">ติดต่อ</a></li>
            </ul>
        </div>

        <!-- ช่องทางการติดต่อ -->
        <div class="footer-section">
            <h3>ช่องทางการติดต่อ</h3>
            <p>📍 กรุงเทพมหานคร</p>
            <p>📞 02-123-4567</p>
            <p>📧 info@example.com</p>
        </div>

    </div>

    <div class="footer-bottom">
        <p>&copy; 2025 เว็บไซต์ตัวอย่าง</p>
    </div>
</footer>

</body>
</html>
